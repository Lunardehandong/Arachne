<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Arachne - Crear Curso</title>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style_cursos.css">
</head>
<body>

<header class="header-rosa">
    <a href="cursos.html" class="back-link">←</a>
    <span class="abril-fatface">Nuevo Curso</span>
</header>

<main class="lista-cursos agregar-curso agregar-main">
    
    <div class="agregar-container">

        <h1 class="abril-fatface agregar-titulo">Detalles del Curso</h1>
        
        <form id="form-nuevo-curso" enctype="multipart/form-data">
            
            <div class="agregar-group">
                <label class="abril-fatface agregar-label">Nombre del Curso</label>
                <input type="text" name="nombre_curso" required class="agregar-input">
            </div>

            <div class="agregar-group">
                <label class="abril-fatface agregar-label">Descripción Corta</label>
                <textarea name="descripcion" required class="agregar-input agregar-textarea-corta"></textarea>
            </div>

            <div class="agregar-group">
                <label class="abril-fatface agregar-label">Contenido Detallado</label>
                <textarea name="contenido_detallado" required class="agregar-input agregar-textarea-larga"></textarea>
            </div>

            <div class="agregar-row">
                
                <div class="agregar-col">
                    <label class="abril-fatface agregar-label">Créditos</label>
                    <input type="number" name="creditos" value="0" class="agregar-input">
                </div>

                <div class="agregar-col">
                    <label class="abril-fatface agregar-label">Nivel</label>
                    <select name="nivel" class="agregar-input">
                        <option value="Principiante">Principiante</option>
                        <option value="Intermedio">Intermedio</option>
                        <option value="Avanzado">Avanzado</option>
                    </select>
                </div>

            </div>

            <button type="submit" class="detalle-btn agregar-btn-full">
                Publicar Curso
            </button>

        </form>
    </div>

</main>

<script>
document.getElementById('form-nuevo-curso').addEventListener('submit', function(e) {
    e.preventDefault();
    const datos = new FormData(this);

    fetch('backend/agregar_curso.php', {
        method: 'POST',
        body: datos
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === 'success') {
            alert("¡Curso creado exitosamente!");
            window.location.href = 'cursos.html';
        } else {
            alert("Error: " + data.message);
        }
    });
});
</script>

</body>
</html>
