<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Arachne - Mi Perfil</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="form-container">
        <div class="perfil-header">
            <div class="foto-perfil-placeholder" id="foto-actual">
                <span id="texto-foto">FOTO</span>
            </div>
            
            <label for="nueva-foto" class="btn-editar-foto" style="cursor:pointer; color:#A2D2FF; text-decoration:underline; font-size:12px;">Cambiar foto de perfil</label>
            
            <form id="form-foto" action="backend/perfil.php" method="POST" enctype="multipart/form-data" style="display:none;">
                <input type="file" name="foto" id="nueva-foto" onchange="document.getElementById('form-foto').submit()">
            </form>
            
            <div class="info-usuario">
                <h3 id="nombre-usuario-real">Cargando...</h3>
                <div class="user-info-box">
                    💰 Créditos Disponibles: <span id="creditos-reales">0</span>
                </div>
            </div>
        </div>

        <div class="seccion-cursos">
            <div class="titulo-seccion">Mis Cursos Comprados</div>
            <div id="contenedor-cursos-comprados"></div>
        </div>

        <p style="margin-top: 25px;">
            <a href="principal.html">Volver al Inicio</a>
        </p>
    </div>

<script>
    // Petición al PHP para obtener los datos reales
    fetch('backend/perfil.php?obtener_datos_usuario=true')
        .then(response => response.json())
        .then(data => {
            // 1. Cargar Nombre y Créditos
            document.getElementById('nombre-usuario-real').textContent = data.usuario;
            document.getElementById('creditos-reales').textContent = data.creditos;
            
            // 2. Lógica para mostrar la FOTO real si existe en la base de datos
            if (data.foto && data.foto !== '') {
                const contenedorFoto = document.getElementById('foto-actual');
                // Insertamos la imagen y ocultamos el texto "FOTO"
                contenedorFoto.innerHTML = `<img src="${data.foto}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
            }

            // 3. Cargar Cursos
            const contenedor = document.getElementById('contenedor-cursos-comprados');
            if(data.cursos.length > 0) {
                data.cursos.forEach(curso => {
                    contenedor.innerHTML += `<div class="curso-comprado-item">✔️ ${curso}</div>`;
                });
            } else {
                contenedor.innerHTML = '<p style="font-size:12px; color:#D81B60;">Aún no tienes cursos comprados.</p>';
            }
        })
        .catch(error => console.error('Error al cargar perfil:', error));
</script>
</body>
</html>
