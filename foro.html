<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Arachne - Foro</title>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style_cursos.css">
</head>
<body>

    <header class="header-rosa" style="display: flex; align-items: center; padding: 0 20px;">
        <!-- Botón para regresar al Principal -->
        <a href="principal.html" style="text-decoration: none; color: #388697; font-size: 30px; margin-right: 15px;">←</a>
        <span class="abril-fatface">Foro Comunitario</span>
    </header>

    <main class="lista-cursos">
        <div id="contenedor-publicaciones">
            <p style="text-align: center; padding: 20px; color: #888;">Cargando comunidad...</p>
        </div>
        
        <a href="agregar_foro.html" class="btn-agregar">+</a>
    </main>

    <script>
        function cargarPublicaciones() {
            fetch('backend/foro.php')
                .then(res => res.json())
                .then(data => {
                    const contenedor = document.getElementById('contenedor-publicaciones');
                    if (data.length === 0) {
                        contenedor.innerHTML = "<p style='text-align:center; padding:40px;'>No hay publicaciones aún.</p>";
                        return;
                    }

                    let html = '';
                    data.forEach(post => {
                        html += `
                            <div class="publicacion-card" style="padding: 20px; border-bottom: 1px solid #E0E0E0; background: white;">
                                <div style="display: flex; align-items: center; margin-bottom: 10px;">
                                    <div style="background-color: #C0CCDA; width: 40px; height: 40px; border-radius: 50%; margin-right: 12px;"></div>
                                    <strong style="color: #08415C;">${post.nombre_usuario}</strong>
                                </div>
                                <h3 class="abril-fatface" style="color: #388697; margin: 5px 0;">${post.titulo}</h3>
                                <p style="color: #555;">${post.descripcion}</p>
                                
                                <div class="seccion-comentarios" id="comentarios-${post.id_tutorial}" 
                                     style="margin-top: 15px; padding-left: 20px; border-left: 2px solid #F9A8A8; font-size: 0.9em;">
                                </div>

                                <div style="margin-top: 15px; display: flex; gap: 10px;">
                                    <input type="text" id="input-${post.id_tutorial}" placeholder="Escribe algo..." 
                                           style="flex: 1; padding: 8px 15px; border: 1px solid #DDD; border-radius: 20px; outline: none;">
                                    <button onclick="enviarComentario(${post.id_tutorial})" 
                                            style="background: #F86A80; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer;">
                                        Comentar
                                    </button>
                                </div>
                            </div>
                        `;
                        cargarComentarios(post.id_tutorial);
                    });
                    contenedor.innerHTML = html;
                });
        }

        function cargarComentarios(id) {
            fetch(`backend/comentarios.php?id=${id}`)
                .then(res => res.json())
                .then(comentarios => {
                    const caja = document.getElementById(`comentarios-${id}`);
                    caja.innerHTML = comentarios.map(c => `
                        <div style="margin-bottom: 5px;">
                            <b style="color: #388697;">${c.nombre_usuario}:</b> ${c.comentario}
                        </div>
                    `).join('');
                });
        }

        function enviarComentario(id) {
            const input = document.getElementById(`input-${id}`);
            const texto = input.value.trim();
            if(!texto) return;

            const datos = new FormData();
            datos.append('id_tutorial', id);
            datos.append('comentario', texto);

            fetch('backend/comentarios.php', { method: 'POST', body: datos })
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success') {
                        input.value = '';
                        cargarComentarios(id);
                    } else {
                        alert(data.message || "Error al comentar");
                    }
                });
        }

        cargarPublicaciones();
    </script>
</body>
</html>
