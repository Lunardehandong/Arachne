<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Arachne - Principal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="form-container">
        <h2>Panel Arachne</h2>
        
        <div class="user-info-box">
            💰 Mis Créditos: <span id="creditos_valor">0</span>
        </div>

        <nav class="menu-vertical">
            <a href="cursos.html" class="btn-menu-principal rosa-fuerte">📚 CURSOS</a>
            <a href="prendas.html" class="btn-menu-principal rosa-claro">👕 COMPRAR PRENDAS</a>
            <a href="foro.html" class="btn-menu-principal rosa-pastel">💬 FORO COMUNIDAD</a>
        </nav>

        <p style="margin-top: 20px;">
            <a href="perfil.html">Mi Perfil</a> | 
            <a href="index.html">Salir</a>
        </p>
    </div>

    <script>
        // Reutilizamos la lógica para pedir los créditos reales al backend
        fetch('backend/perfil.php?obtener_datos_usuario=true')
            .then(response => response.json())
            .then(data => {
                // Actualizamos el número de créditos en pantalla
                document.getElementById('creditos_valor').textContent = data.creditos;
            })
            .catch(error => console.error('Error al obtener créditos:', error));
    </script>
</body>
</html>
