<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="form-container">
    <form action="backend/registro.php" method="POST">
        <h2>Crear Cuenta</h2>
        <input type="text" name="nombre_completo" placeholder="Nombre Completo" required>
        <input type="text" name="nombre_usuario" placeholder="Crea un Username" required>
        <input type="email" name="correo" placeholder="Correo Electrónico" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        
        <select name="interes_principal">
            <option value="R">Intercambio de Ropa</option>
            <option value="T">Tutoriales y Cursos</option>
        </select>

        <button type="submit">REGISTRARSE</button>
        <p>¿Ya eres miembro? <a href="index.html">Inicia Sesión</a></p>
    </form>
</div>

</body>
</html>
